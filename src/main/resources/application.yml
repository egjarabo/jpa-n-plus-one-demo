spring:
  application:
    name: jpa-n-plus-one-demo

  datasource:
    url: jdbc:h2:mem:nplusonedb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

logging:
  level:
    org.hibernate.SQL: DEBUG
   # org.hibernate.orm.jdbc.bind: TRACE
   # org.hibernate.stat: DEBUG